<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Header -->
  <rect width="1200" height="56" fill="#1e293b"/>
  <text x="24" y="34" fill="#f8fafc" font-size="15" font-weight="700">Programme Effectiveness Assessment — Root Cause Analysis &amp; Remediation Map</text>
  <text x="24" y="50" fill="#475569" font-size="10">Anonymised Engagement · ⚠ DUMMY DATA — FOR ILLUSTRATION PURPOSES ONLY</text>
  <rect x="1058" y="15" width="120" height="24" rx="12" fill="#1d4ed8" opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
  <text x="1118" y="31" fill="#93c5fd" font-size="10" font-weight="700" text-anchor="middle">CONFIDENTIAL</text>

  <text x="24" y="76" fill="#475569" font-size="10" font-weight="700" letter-spacing="1.5">FOUR DIMENSIONS — GAP IDENTIFIED → ROOT CAUSE → REMEDIATION → STATUS</text>

  <!-- Column headers -->
  <rect x="20" y="84" width="1160" height="24" fill="#1e293b" rx="4"/>
  <text x="36" y="100" fill="#475569" font-size="9" font-weight="700" letter-spacing="1">DIMENSION</text>
  <text x="240" y="100" fill="#475569" font-size="9" font-weight="700" letter-spacing="1">GAP IDENTIFIED</text>
  <text x="540" y="100" fill="#475569" font-size="9" font-weight="700" letter-spacing="1">ROOT CAUSE</text>
  <text x="800" y="100" fill="#475569" font-size="9" font-weight="700" letter-spacing="1">REMEDIATION</text>
  <text x="1090" y="100" fill="#475569" font-size="9" font-weight="700" letter-spacing="1">STATUS</text>

  <!-- ═══ ROW 1: COMMUNICATION ═══ -->
  <rect x="20" y="110" width="1160" height="80" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <rect x="20" y="110" width="196" height="80" rx="4" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="118" y="132" fill="#fca5a5" font-size="10" font-weight="800" text-anchor="middle">COMMUNICATION</text>
  <text x="118" y="148" fill="#64748b" font-size="8" text-anchor="middle">Staff awareness &amp;</text>
  <text x="118" y="160" fill="#64748b" font-size="8" text-anchor="middle">visibility of channel</text>
  <text x="240" y="130" fill="#94a3b8" font-size="8.5">No communication since initial launch.</text>
  <text x="240" y="146" fill="#94a3b8" font-size="8.5">Reporting channel unknown to majority</text>
  <text x="240" y="162" fill="#94a3b8" font-size="8.5">of staff across portfolio companies.</text>
  <text x="540" y="130" fill="#94a3b8" font-size="8.5">No ongoing comms cadence defined</text>
  <text x="540" y="146" fill="#94a3b8" font-size="8.5">in original programme design.</text>
  <text x="540" y="162" fill="#94a3b8" font-size="8.5">Launch treated as one-time event.</text>
  <text x="800" y="130" fill="#94a3b8" font-size="8.5">Multi-channel campaign: email, posters,</text>
  <text x="800" y="146" fill="#94a3b8" font-size="8.5">screensavers, town halls. Annual comms</text>
  <text x="800" y="162" fill="#94a3b8" font-size="8.5">calendar embedded in programme plan.</text>
  <rect x="1082" y="126" width="82" height="22" rx="11" fill="#052e16" stroke="#10b981" stroke-width="1"/>
  <text x="1123" y="141" fill="#6ee7b7" font-size="9" font-weight="700" text-anchor="middle">✓ Closed</text>

  <!-- ═══ ROW 2: LEADERSHIP ═══ -->
  <rect x="20" y="194" width="1160" height="80" rx="4" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <rect x="20" y="194" width="196" height="80" rx="4" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="118" y="216" fill="#fcd34d" font-size="10" font-weight="800" text-anchor="middle">LEADERSHIP</text>
  <text x="118" y="232" fill="#64748b" font-size="8" text-anchor="middle">Tone from the top</text>
  <text x="118" y="244" fill="#64748b" font-size="8" text-anchor="middle">&amp; endorsement</text>
  <text x="240" y="214" fill="#94a3b8" font-size="8.5">No visible leadership commitment to</text>
  <text x="240" y="230" fill="#94a3b8" font-size="8.5">the programme. No CEO-level messaging</text>
  <text x="240" y="246" fill="#94a3b8" font-size="8.5">or encouragement to use the channel.</text>
  <text x="540" y="214" fill="#94a3b8" font-size="8.5">Programme owned at operational level</text>
  <text x="540" y="230" fill="#94a3b8" font-size="8.5">only; no board or executive sponsorship</text>
  <text x="540" y="246" fill="#94a3b8" font-size="8.5">formally assigned.</text>
  <text x="800" y="214" fill="#94a3b8" font-size="8.5">CEO-level message issued per entity.</text>
  <text x="800" y="230" fill="#94a3b8" font-size="8.5">Board formally designated as programme</text>
  <text x="800" y="246" fill="#94a3b8" font-size="8.5">sponsor. Included in AC agenda.</text>
  <rect x="1082" y="210" width="82" height="22" rx="11" fill="#052e16" stroke="#10b981" stroke-width="1"/>
  <text x="1123" y="225" fill="#6ee7b7" font-size="9" font-weight="700" text-anchor="middle">✓ Closed</text>

  <!-- ═══ ROW 3: TRAINING ═══ -->
  <rect x="20" y="278" width="1160" height="80" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <rect x="20" y="278" width="196" height="80" rx="4" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="118" y="300" fill="#93c5fd" font-size="10" font-weight="800" text-anchor="middle">TRAINING</text>
  <text x="118" y="316" fill="#64748b" font-size="8" text-anchor="middle">Staff &amp; manager</text>
  <text x="118" y="328" fill="#64748b" font-size="8" text-anchor="middle">competence</text>
  <text x="240" y="298" fill="#94a3b8" font-size="8.5">Whistleblowing absent from induction</text>
  <text x="240" y="314" fill="#94a3b8" font-size="8.5">programme. No refresher training since</text>
  <text x="240" y="330" fill="#94a3b8" font-size="8.5">original launch. New managers unaware.</text>
  <text x="540" y="298" fill="#94a3b8" font-size="8.5">Training was a one-time activity at</text>
  <text x="540" y="314" fill="#94a3b8" font-size="8.5">launch; no refresh cycle built into</text>
  <text x="540" y="330" fill="#94a3b8" font-size="8.5">the programme calendar.</text>
  <text x="800" y="298" fill="#94a3b8" font-size="8.5">Induction updated with standing module.</text>
  <text x="800" y="314" fill="#94a3b8" font-size="8.5">Manager refresher training delivered.</text>
  <text x="800" y="330" fill="#94a3b8" font-size="8.5">Annual refresh scheduled going forward.</text>
  <rect x="1082" y="294" width="82" height="22" rx="11" fill="#052e16" stroke="#10b981" stroke-width="1"/>
  <text x="1123" y="309" fill="#6ee7b7" font-size="9" font-weight="700" text-anchor="middle">✓ Closed</text>

  <!-- ═══ ROW 4: MEASUREMENT ═══ -->
  <rect x="20" y="362" width="1160" height="80" rx="4" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <rect x="20" y="362" width="196" height="80" rx="4" fill="#1e293b" stroke="#818cf8" stroke-width="1"/>
  <text x="118" y="384" fill="#a5b4fc" font-size="10" font-weight="800" text-anchor="middle">MEASUREMENT</text>
  <text x="118" y="400" fill="#64748b" font-size="8" text-anchor="middle">Programme health</text>
  <text x="118" y="412" fill="#64748b" font-size="8" text-anchor="middle">&amp; reporting</text>
  <text x="240" y="382" fill="#94a3b8" font-size="8.5">No usage metrics tracked. No reporting</text>
  <text x="240" y="398" fill="#94a3b8" font-size="8.5">to Audit Committee. No way to assess</text>
  <text x="240" y="414" fill="#94a3b8" font-size="8.5">if programme was working at all.</text>
  <text x="540" y="382" fill="#94a3b8" font-size="8.5">Programme assumed to be self-sustaining</text>
  <text x="540" y="398" fill="#94a3b8" font-size="8.5">post-launch; no ownership assigned for</text>
  <text x="540" y="414" fill="#94a3b8" font-size="8.5">ongoing reporting or measurement.</text>
  <text x="800" y="382" fill="#94a3b8" font-size="8.5">Baseline metrics established. Quarterly</text>
  <text x="800" y="398" fill="#94a3b8" font-size="8.5">AC summary template designed. Annual</text>
  <text x="800" y="414" fill="#94a3b8" font-size="8.5">ISO 37002:2021 review scheduled.</text>
  <rect x="1082" y="378" width="82" height="22" rx="11" fill="#052e16" stroke="#10b981" stroke-width="1"/>
  <text x="1123" y="393" fill="#6ee7b7" font-size="9" font-weight="700" text-anchor="middle">✓ Closed</text>

  <!-- ═══ SUMMARY BANNER ═══ -->
  <rect x="20" y="458" width="1160" height="110" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="36" y="478" fill="#475569" font-size="10" font-weight="700" letter-spacing="1.5">ENGAGEMENT SUMMARY</text>
  <rect x="36" y="486" width="260" height="60" rx="4" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="166" y="504" fill="#fca5a5" font-size="10" font-weight="800" text-anchor="middle">BEFORE</text>
  <text x="166" y="520" fill="#64748b" font-size="8.5" text-anchor="middle">Programme on paper only.</text>
  <text x="166" y="534" fill="#64748b" font-size="8.5" text-anchor="middle">4 critical gaps. Effectively dormant.</text>
  <rect x="310" y="486" width="46" height="60" rx="4" fill="#1e293b"/>
  <text x="333" y="521" fill="#475569" font-size="18" font-weight="900" text-anchor="middle">→</text>
  <rect x="370" y="486" width="440" height="60" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="590" y="504" fill="#93c5fd" font-size="10" font-weight="800" text-anchor="middle">INTERVENTION</text>
  <text x="590" y="520" fill="#64748b" font-size="8.5" text-anchor="middle">Effectiveness assessment · Awareness campaign · Portfolio rollout</text>
  <text x="590" y="534" fill="#64748b" font-size="8.5" text-anchor="middle">Leadership engagement · Training refresh · Metrics &amp; AC reporting</text>
  <rect x="824" y="486" width="46" height="60" rx="4" fill="#1e293b"/>
  <text x="847" y="521" fill="#475569" font-size="18" font-weight="900" text-anchor="middle">→</text>
  <rect x="884" y="486" width="280" height="60" rx="4" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="1024" y="504" fill="#6ee7b7" font-size="10" font-weight="800" text-anchor="middle">AFTER</text>
  <text x="1024" y="520" fill="#6ee7b7" font-size="8.5" text-anchor="middle">All 4 gaps closed. Programme</text>
  <text x="1024" y="534" fill="#6ee7b7" font-size="8.5" text-anchor="middle">revived and embedded group-wide.</text>

  <!-- Footer -->
  <rect x="0" y="598" width="1200" height="32" fill="#1e293b"/>
  <text x="24" y="619" fill="#475569" font-size="10">All names, company identifiers, and figures shown are fictitious and used for portfolio illustration only · Not based on any real client engagement</text>
</svg>
