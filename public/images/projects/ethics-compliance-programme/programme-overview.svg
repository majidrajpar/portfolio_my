<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Header -->
  <rect width="1200" height="56" fill="#1e293b"/>
  <text x="24" y="34" fill="#f8fafc" font-size="15" font-weight="700">Ethics &amp; Compliance Programme — UAE Multi-Country Cloud Kitchen Platform</text>
  <text x="24" y="50" fill="#475569" font-size="10">Anonymised Internal Role · ⚠ DUMMY DATA — FOR ILLUSTRATION PURPOSES ONLY</text>
  <rect x="1058" y="15" width="120" height="24" rx="12" fill="#1d4ed8" opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
  <text x="1118" y="31" fill="#93c5fd" font-size="10" font-weight="700" text-anchor="middle">CONFIDENTIAL</text>

  <!-- Section label -->
  <text x="24" y="76" fill="#475569" font-size="10" font-weight="700" letter-spacing="1.5">THREE PROGRAMMES — ONE PLATFORM — SEVEN COUNTRIES</text>

  <!-- ═══ PLATFORM BOX (centre top) ═══ -->
  <rect x="424" y="84" width="352" height="52" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="600" y="106" fill="#93c5fd" font-size="13" font-weight="800" text-anchor="middle">ETHICS PLATFORM — ETHICSPOINT</text>
  <text x="600" y="124" fill="#64748b" font-size="9" text-anchor="middle">Sourced via structured vendor evaluation · Background check · TPRA completed · SLAs negotiated</text>

  <!-- Connector lines from platform to 3 programme boxes -->
  <line x1="424" y1="110" x2="226" y2="165" stroke="#334155" stroke-width="1.5"/>
  <line x1="600" y1="136" x2="600" y2="165" stroke="#334155" stroke-width="1.5"/>
  <line x1="776" y1="110" x2="974" y2="165" stroke="#334155" stroke-width="1.5"/>

  <!-- ═══ PROGRAMME 1: WHISTLEBLOWING (left) ═══ -->
  <rect x="20" y="165" width="392" height="170" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="20" y="165" width="392" height="26" rx="6" fill="#1e3a5f"/>
  <rect x="20" y="181" width="392" height="10" fill="#1e3a5f"/>
  <text x="216" y="182" fill="#93c5fd" font-size="11" font-weight="800" text-anchor="middle">① WHISTLEBLOWING PROGRAMME</text>
  <text x="36" y="210" fill="#94a3b8" font-size="9">· Anonymous reporting channel for all staff</text>
  <text x="36" y="226" fill="#94a3b8" font-size="9">· Multi-language intake (7 jurisdictions)</text>
  <text x="36" y="242" fill="#94a3b8" font-size="9">· SLAs defined: intake, triage, investigation</text>
  <text x="36" y="258" fill="#94a3b8" font-size="9">· Audit Committee escalation path embedded</text>
  <text x="36" y="274" fill="#94a3b8" font-size="9">· Non-retaliation protection clause</text>
  <rect x="36" y="288" width="360" height="22" rx="11" fill="#0c2a3e" stroke="#3b82f6" stroke-width="1"/>
  <text x="216" y="303" fill="#6ee7b7" font-size="9" font-weight="700" text-anchor="middle">✓ Live across all 7 countries</text>

  <!-- ═══ PROGRAMME 2: EXECUTIVE DISCLOSURES (centre) ═══ -->
  <rect x="404" y="165" width="392" height="170" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="404" y="165" width="392" height="26" rx="6" fill="#2e1065"/>
  <rect x="404" y="181" width="392" height="10" fill="#2e1065"/>
  <text x="600" y="182" fill="#c4b5fd" font-size="11" font-weight="800" text-anchor="middle">② EXECUTIVE VOLUNTARY DISCLOSURES</text>
  <text x="420" y="210" fill="#94a3b8" font-size="9">· Senior leadership proactively disclose:</text>
  <text x="436" y="226" fill="#94a3b8" font-size="9">— Relatives employed by or linked to suppliers</text>
  <text x="436" y="242" fill="#94a3b8" font-size="9">— Gifts received above defined threshold</text>
  <text x="436" y="258" fill="#94a3b8" font-size="9">— Business interests that may create conflicts</text>
  <text x="420" y="274" fill="#94a3b8" font-size="9">· Disclosures reviewed by Audit Committee</text>
  <rect x="420" y="288" width="360" height="22" rx="11" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
  <text x="600" y="303" fill="#a5b4fc" font-size="9" font-weight="700" text-anchor="middle">Annual disclosure cycle · AC reviewed</text>

  <!-- ═══ PROGRAMME 3: COI ACKNOWLEDGEMENTS (right) ═══ -->
  <rect x="788" y="165" width="392" height="170" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <rect x="788" y="165" width="392" height="26" rx="6" fill="#052e16"/>
  <rect x="788" y="181" width="392" height="10" fill="#052e16"/>
  <text x="984" y="182" fill="#6ee7b7" font-size="11" font-weight="800" text-anchor="middle">③ ANNUAL COI ACKNOWLEDGEMENTS</text>
  <text x="804" y="210" fill="#94a3b8" font-size="9">· Targeted at roles with COI exposure:</text>
  <text x="820" y="226" fill="#94a3b8" font-size="9">— Real estate &amp; property decisions</text>
  <text x="820" y="242" fill="#94a3b8" font-size="9">— Capital projects &amp; contractor selection</text>
  <text x="820" y="258" fill="#94a3b8" font-size="9">— Procurement &amp; vendor management</text>
  <text x="804" y="274" fill="#94a3b8" font-size="9">· Annual signed acknowledgement + declaration</text>
  <rect x="804" y="288" width="360" height="22" rx="11" fill="#052e16" stroke="#10b981" stroke-width="1"/>
  <text x="984" y="303" fill="#6ee7b7" font-size="9" font-weight="700" text-anchor="middle">✓ Structured annual disclosure cycle</text>

  <!-- ═══ ROLLOUT COUNTRIES ROW ═══ -->
  <rect x="20" y="350" width="1160" height="62" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="36" y="370" fill="#475569" font-size="10" font-weight="700" letter-spacing="1.5">7-COUNTRY DEPLOYMENT</text>
  <rect x="36" y="378" width="136" height="22" rx="4" fill="#1e3a5f"/>
  <text x="104" y="393" fill="#93c5fd" font-size="9" font-weight="700" text-anchor="middle">UAE</text>
  <rect x="184" y="378" width="136" height="22" rx="4" fill="#1e3a5f"/>
  <text x="252" y="393" fill="#93c5fd" font-size="9" font-weight="700" text-anchor="middle">Saudi Arabia</text>
  <rect x="332" y="378" width="136" height="22" rx="4" fill="#1e3a5f"/>
  <text x="400" y="393" fill="#93c5fd" font-size="9" font-weight="700" text-anchor="middle">Kuwait</text>
  <rect x="480" y="378" width="136" height="22" rx="4" fill="#1e3a5f"/>
  <text x="548" y="393" fill="#93c5fd" font-size="9" font-weight="700" text-anchor="middle">Qatar</text>
  <rect x="628" y="378" width="136" height="22" rx="4" fill="#1e3a5f"/>
  <text x="696" y="393" fill="#93c5fd" font-size="9" font-weight="700" text-anchor="middle">Bahrain</text>
  <rect x="776" y="378" width="136" height="22" rx="4" fill="#334155"/>
  <text x="844" y="393" fill="#94a3b8" font-size="9" font-weight="700" text-anchor="middle">Poland</text>
  <rect x="924" y="378" width="240" height="22" rx="4" fill="#334155"/>
  <text x="1044" y="393" fill="#94a3b8" font-size="9" font-weight="700" text-anchor="middle">Denmark</text>

  <!-- ═══ TRAINING ROW ═══ -->
  <rect x="20" y="424" width="570" height="90" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="36" y="444" fill="#475569" font-size="10" font-weight="700" letter-spacing="1.5">TRAINING &amp; AWARENESS</text>
  <text x="36" y="462" fill="#64748b" font-size="9">· Post-implementation training delivered to all staff across all 7 countries</text>
  <text x="36" y="478" fill="#64748b" font-size="9">· Standalone induction training module created for all new joiners globally</text>
  <text x="36" y="494" fill="#64748b" font-size="9">· Awareness posters deployed at all office and kitchen operational sites</text>
  <text x="36" y="510" fill="#64748b" font-size="9">· Materials verified as current and accessible during internal audit site visits</text>

  <!-- ═══ VENDOR SELECTION SUMMARY ═══ -->
  <rect x="606" y="424" width="574" height="90" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="622" y="444" fill="#475569" font-size="10" font-weight="700" letter-spacing="1.5">PLATFORM SOURCING PROCESS</text>
  <rect x="622" y="452" width="130" height="22" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
  <text x="687" y="467" fill="#93c5fd" font-size="9" font-weight="600" text-anchor="middle">1. Define Criteria</text>
  <rect x="762" y="452" width="130" height="22" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
  <text x="827" y="467" fill="#93c5fd" font-size="9" font-weight="600" text-anchor="middle">2. Market Scan</text>
  <rect x="902" y="452" width="130" height="22" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
  <text x="967" y="467" fill="#93c5fd" font-size="9" font-weight="600" text-anchor="middle">3. Shortlist</text>
  <rect x="1042" y="452" width="122" height="22" rx="4" fill="#052e16" stroke="#10b981" stroke-width="1"/>
  <text x="1103" y="467" fill="#6ee7b7" font-size="9" font-weight="700" text-anchor="middle">✓ EthicsPoint</text>
  <text x="622" y="496" fill="#64748b" font-size="9">Background check completed · Third-party risk assessment (TPRA) passed · SLAs negotiated</text>
  <text x="622" y="510" fill="#64748b" font-size="9">Vendor selected on criteria including anonymity design, multi-jurisdiction support, and AC reporting capability</text>

  <!-- Footer -->
  <rect x="0" y="598" width="1200" height="32" fill="#1e293b"/>
  <text x="24" y="619" fill="#475569" font-size="10">All names, company identifiers, and figures shown are fictitious and used for portfolio illustration only · Not based on any real client engagement</text>
</svg>
